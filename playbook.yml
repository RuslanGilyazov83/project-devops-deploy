---
- name: Подготовка сервера в Yandex Cloud для Docker-деплоя
  hosts: yc_server
  become: true

  vars:
    # Параметры из Vault (секретные значения)
    postgres_db: "{{ vault_postgres_db }}"
    postgres_user: "{{ vault_postgres_user }}"
    postgres_password: "{{ vault_postgres_password }}"
    s3_bucket: "{{ vault_s3_bucket | default('') }}"
    s3_region: "{{ vault_s3_region | default('') }}"
    s3_endpoint: "{{ vault_s3_endpoint | default('') }}"
    s3_access_key: "{{ vault_s3_access_key | default('') }}"
    s3_secret_key: "{{ vault_s3_secret_key | default('') }}"
    s3_cdn_url: "{{ vault_s3_cdn_url | default('') }}"

    # Email для Let's Encrypt из Vault
    certbot_admin_email: "{{ vault_certbot_email }}"

    # Переменные окружения приложения (чувствительные значения из Vault)
    app_env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: "jdbc:postgresql://bulletins-postgres:5432/{{ postgres_db }}"
      SPRING_DATASOURCE_USERNAME: "{{ postgres_user }}"
      SPRING_DATASOURCE_PASSWORD: "{{ postgres_password }}"
      STORAGE_S3_BUCKET: "{{ s3_bucket }}"
      STORAGE_S3_REGION: "{{ s3_region }}"
      STORAGE_S3_ENDPOINT: "{{ s3_endpoint }}"
      STORAGE_S3_ACCESSKEY: "{{ s3_access_key }}"
      STORAGE_S3_SECRETKEY: "{{ s3_secret_key }}"
      STORAGE_S3_CDNURL: "{{ s3_cdn_url }}"

  roles:
    - geerlingguy.docker
    - geerlingguy.nginx
    - db_postgres
    - app_deploy
    - nginx_proxy
    - geerlingguy.certbot

  tasks:
    - name: Устанавливаем ufw для управления фаерволом
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Запрещаем входящие подключения по умолчанию, разрешаем исходящие
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Разрешаем исходящие подключения
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Разрешаем SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Разрешаем HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Разрешаем HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Разрешаем порт приложения
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: Разрешаем порт мониторинга/actuator
      community.general.ufw:
        rule: allow
        port: "9090"
        proto: tcp

    - name: Включаем ufw
      community.general.ufw:
        state: enabled
        logging: "on"

