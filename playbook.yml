---
- name: Подготовка сервера в Yandex Cloud для Docker-деплоя
  hosts: yc_server
  become: true

  vars_files:
    # Здесь ожидается Ansible Vault с чувствительными данными (БД, пароли и т.п.)
    - group_vars/yc_server/vault.yml

  vars:
    # Пользователь ВМ, которого добавляем в группу docker
    docker_users:
      - yc-user

    # Параметры базы данных PostgreSQL
    postgres_db: "{{ vault_postgres_db }}"
    postgres_user: "{{ vault_postgres_user }}"
    postgres_password: "{{ vault_postgres_password }}"
    s3_bucket: "{{ vault_s3_bucket | default('') }}"
    s3_region: "{{ vault_s3_region | default('') }}"
    s3_endpoint: "{{ vault_s3_endpoint | default('') }}"
    s3_access_key: "{{ vault_s3_access_key | default('') }}"
    s3_secret_key: "{{ vault_s3_secret_key | default('') }}"
    s3_cdn_url: "{{ vault_s3_cdn_url | default('') }}"

    # Nginx: имя сервера для виртуального хоста
    nginx_server_name: bulletins.mooo.com

    # Certbot (Let's Encrypt)
    certbot_install_method: package
    certbot_admin_email: "{{ vault_certbot_email }}"
    certbot_create_if_missing: true
    certbot_create_method: standalone
    # Останавливаем Nginx на время получения сертификата (standalone-режим)
    certbot_create_standalone_stop_services:
      - nginx
    certbot_certs:
      - domains:
          - "{{ nginx_server_name }}"
    # Автопродление через cron
    certbot_auto_renew: true
    certbot_auto_renew_user: root
    certbot_auto_renew_hour: "3"
    certbot_auto_renew_minute: "30"
    # После продления — перезапуск Nginx
    certbot_auto_renew_options: "--quiet --deploy-hook 'systemctl reload nginx'"

    # Имя и тег Docker-образа приложения
    app_image_name: ruslangilyazov/project-devops-deploy
    # Тег по умолчанию — latest, можно переопределить extra-vars (app_image_tag=...)
    app_image_tag: latest

    # Имя контейнера
    app_container_name: bulletins-app

    # Переменные окружения приложения (чувствительные значения храните в Ansible Vault)
    app_env:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: "jdbc:postgresql://bulletins-postgres:5432/{{ postgres_db }}"
      SPRING_DATASOURCE_USERNAME: "{{ postgres_user }}"
      SPRING_DATASOURCE_PASSWORD: "{{ postgres_password }}"
      STORAGE_S3_BUCKET: "{{ s3_bucket }}"
      STORAGE_S3_REGION: "{{ s3_region }}"
      STORAGE_S3_ENDPOINT: "{{ s3_endpoint }}"
      STORAGE_S3_ACCESSKEY: "{{ s3_access_key }}"
      STORAGE_S3_SECRETKEY: "{{ s3_secret_key }}"
      STORAGE_S3_CDNURL: "{{ s3_cdn_url }}"

  roles:
    - geerlingguy.docker
    - geerlingguy.nginx
    - db_postgres
    - app_deploy
    - nginx_proxy
    - geerlingguy.certbot

  tasks:
    - name: Устанавливаем ufw для управления фаерволом
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Запрещаем входящие подключения по умолчанию, разрешаем исходящие
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Разрешаем исходящие подключения
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Разрешаем SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Разрешаем HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Разрешаем HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Разрешаем порт приложения
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: Разрешаем порт мониторинга/actuator
      community.general.ufw:
        rule: allow
        port: "9090"
        proto: tcp

    - name: Включаем ufw
      community.general.ufw:
        state: enabled
        logging: "on"

